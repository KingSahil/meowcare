services:
  - type: web
    name: meowcare-backend
    runtime: node
    rootDir: backend
    buildCommand: bun install
    startCommand: bun run server.ts
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BUN_VERSION
        value: 1.3.4
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TEXT_MODEL
        sync: false
      - key: GROQ_VISION_MODEL
        sync: false
  - type: web
    name: meowcare-whatsapp-bot
    runtime: node
    rootDir: Whatsapp
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: whatsapp-auth
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: WA_AUTH_DIR
        value: /var/data/wa-auth
      - key: API_BASE_URL
        sync: false
      - key: DEMO_PATIENT_PHONE
        sync: false
      - key: DEMO_USER_ID
        value: 11111111-1111-1111-1111-111111111111
      - key: DEMO_MEDICINE
        value: BP medicine
      - key: DEMO_DOSAGE
        value: 1 tablet
      - key: REMINDER_CRON
        value: "*/30 * * * *"
